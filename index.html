<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>現場マップ</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div id="app">

    <div id="panel">

        <h2>🏠 現場マップ</h2>

        <input id="customer" type="text" placeholder="お客様名">

        <input id="address" type="text" placeholder="住所">

        <select id="work">
            <option>ドアホン交換</option>
            <option>温水便座</option>
            <option>照明交換</option>
            <option>コンセント交換</option>
            <option>LAN工事</option>
            <option>その他</option>
        </select>

        <input id="time" type="number" value="60">

        <button id="addBtn">
            現場追加
        </button>

        <hr>

        <h3>📋 現場一覧</h3>

        <div id="list">

        </div>

    </div>

    <div id="map"></div>

</div>

<script src="script.js"></script>

</body>
</html>
